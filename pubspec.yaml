name: vpn
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI and utilities
  cupertino_icons: ^1.0.8
  http: ^1.1.0
  provider: ^6.1.1
  csv: ^6.0.0
  shared_preferences: ^2.2.3
  intl: ^0.20.2

  # VPN control
  openvpn_flutter: ^1.3.4


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.2

flutter:
  uses-material-design: true

  assets:
    - assets/icon/app_icon.png
    - assets/vpn/jpn_vpn_tcp_fixed.ovpn  # Japan VPN configuration file
    - assets/vpn/jpn_vpn_minimal.ovpn    # Minimal Japan VPN config for testing
    - assets/vpn/jpn_vpn_credentials.txt  # Japan VPN credentials

# Configuration for flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
